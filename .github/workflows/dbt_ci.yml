name: dbt CI

# Validates every PR against the isolated `ci` Databricks target (see the
# `ci` output in profiles/profiles.yml and macros/get_custom_schema.sql) --
# never against the real prod silver/gold schemas. This is the required
# status check that gates auto-merge for the self-heal agent (see agent/):
# a PR the agent opens can only be merged automatically once this is green.
#
# Also runs for regular human-authored PRs touching the same paths, so it
# doubles as normal pre-merge CI for the dbt project.

on:
  pull_request:
    branches: [main]
    paths:
      - "dags/**"
      - "models/**"
      - "macros/**"
      - "seeds/**"
      - "snapshots/**"
      - "analyses/**"
      - "tests/**"
      - "profiles/**"
      - "dbt_project.yml"

concurrency:
  group: dbt-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dbt-build:
    runs-on: ubuntu-latest
    # Surfaced in the GitHub API as check-run name "dbt CI / dbt-build" --
    # this is the exact string to require in the branch protection rule and
    # the string the agent's risk_gate polls for.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: python -m pip install --no-cache-dir -r requirements.txt

      - name: dbt build (against isolated ci schema)
        env:
          DBT_DATABRICKS_HOST: ${{ secrets.DBT_DATABRICKS_HOST }}
          DBT_DATABRICKS_HTTP_PATH: ${{ secrets.DBT_DATABRICKS_HTTP_PATH }}
          DBT_DATABRICKS_CI_TOKEN: ${{ secrets.DBT_DATABRICKS_CI_TOKEN }}
          DBT_DATABRICKS_CATALOG: ${{ vars.DBT_DATABRICKS_CATALOG }}
          DBT_DATABRICKS_CI_SCHEMA: ${{ vars.DBT_DATABRICKS_CI_SCHEMA }}
        run: |
          set -euo pipefail
          dbt build --project-dir . --profiles-dir ./profiles --target ci
