name: Deploy to MWAA

# Syncs the dbt project + Airflow DAGs to the MWAA S3 bucket on every push to
# main. The DAGs folder (models/macros/seeds/.../dags/) is picked up by MWAA
# automatically within ~1 minute of landing in S3 -- no extra step needed.
#
# requirements.txt and startup.sh are different: MWAA pins a specific S3
# object *version* for each in the environment config, so uploading a new
# copy alone doesn't take effect. When either file changes, this workflow
# also looks up the new version ID and calls `aws mwaa update-environment`
# to point the environment at it (which briefly restarts the environment).

on:
  push:
    branches: [main]
    paths:
      - "dags/**"
      - "models/**"
      - "macros/**"
      - "seeds/**"
      - "snapshots/**"
      - "analyses/**"
      - "tests/**"
      - "profiles/**"
      - "dbt_project.yml"
      - "mwaa/**"

permissions:
  id-token: write # required to mint the OIDC token for AssumeRoleWithWebIdentity
  contents: read

concurrency:
  group: deploy-mwaa
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync dbt project + DAGs to S3
        run: |
          set -euo pipefail
          BUCKET="${{ vars.S3_BUCKET }}"

          # All pieces (dbt project files + DAG .py files) land flat under the
          # same s3://<bucket>/dags/ prefix, matching the MWAA "DAGs folder"
          # setting. They're assembled into one staging dir first and synced
          # in a single pass so that --delete (which prunes anything at the
          # destination not present in the source) only ever compares against
          # this one complete tree, instead of multiple syncs to the same
          # prefix stepping on each other's files.
          STAGING_DIR="$(mktemp -d)"

          cp dbt_project.yml "${STAGING_DIR}/"
          for dir in models macros seeds snapshots analyses tests profiles; do
            if [ -d "${dir}" ]; then
              cp -r "${dir}" "${STAGING_DIR}/"
            fi
          done
          cp dags/*.py "${STAGING_DIR}/"

          aws s3 sync "${STAGING_DIR}/" "s3://${BUCKET}/dags/" --delete --exclude "__pycache__/*"

      - name: Detect requirements.txt / startup.sh changes
        id: mwaa_config
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ -z "${BEFORE}" ] || [ "${BEFORE}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "${BEFORE}" "${AFTER}" | grep -qE '^mwaa/(requirements\.txt|startup\.sh)$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload requirements.txt / startup.sh and re-point MWAA at the new versions
        if: steps.mwaa_config.outputs.changed == 'true'
        run: |
          set -euo pipefail
          BUCKET="${{ vars.S3_BUCKET }}"

          aws s3 cp mwaa/requirements.txt "s3://${BUCKET}/requirements.txt"
          aws s3 cp mwaa/startup.sh "s3://${BUCKET}/startup.sh"

          REQ_VERSION=$(aws s3api head-object --bucket "${BUCKET}" --key requirements.txt --query VersionId --output text)
          STARTUP_VERSION=$(aws s3api head-object --bucket "${BUCKET}" --key startup.sh --query VersionId --output text)

          echo "New requirements.txt version: ${REQ_VERSION}"
          echo "New startup.sh version: ${STARTUP_VERSION}"

          aws mwaa update-environment \
            --name "${{ vars.MWAA_ENV_NAME }}" \
            --requirements-s3-object-version "${REQ_VERSION}" \
            --startup-script-s3-object-version "${STARTUP_VERSION}"
