dbt_ai_project:
  target: prod
  outputs:
    dev:
      type: databricks
      catalog: "{{ env_var('DBT_DATABRICKS_CATALOG', 'default') }}"
      schema: "{{ env_var('DBT_DATABRICKS_SCHEMA', 'dbt_ai_project_dev') }}"
      host: "{{ env_var('DBT_DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DBT_DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DBT_DATABRICKS_TOKEN') }}"
      threads: 4

    prod:
      type: databricks
      catalog: "{{ env_var('DBT_DATABRICKS_CATALOG', 'default') }}"
      schema: "{{ env_var('DBT_DATABRICKS_SCHEMA', 'dbt_ai_project') }}"
      host: "{{ env_var('DBT_DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DBT_DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DBT_DATABRICKS_TOKEN') }}"
      threads: 8

    # Scratch target used only by the self-heal agent (agent/) and the
    # dbt_ci.yml PR workflow to validate candidate fixes. Same catalog/host
    # as prod so the agent still resolves real upstream data via ref()/
    # source(), but writes land in an isolated schema unrelated to the prod
    # silver/gold schemas -- a bad candidate fix can never touch prod data.
    # DBT_DATABRICKS_CI_TOKEN should be a separate, narrowly-scoped
    # Databricks token/service principal with grants on this schema only
    # (see agent/README.md for the exact GRANT statements to run once).
    ci:
      type: databricks
      catalog: "{{ env_var('DBT_DATABRICKS_CATALOG', 'default') }}"
      schema: "{{ env_var('DBT_DATABRICKS_CI_SCHEMA', 'agent_ci') }}"
      host: "{{ env_var('DBT_DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DBT_DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DBT_DATABRICKS_CI_TOKEN', env_var('DBT_DATABRICKS_TOKEN', '')) }}"
      threads: 4
